# ═════════════════════ 일반 ═════════════════════
# prefix 를 Ctrl-a 로
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 터미널 / 트루컬러
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 인덱스 / 동작
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
set -g mouse on

# ═════════════════════ 페인 ═════════════════════
# 페인 경계 + 제목 표시
set -g pane-border-status top
set -g pane-border-lines double
set -g pane-border-format " [ #P: #T ] "

# ═════════════════════ 키바인딩 ═════════════════════
# 설정 리로드
bind r source-file ~/.tmux.conf \; display "reloaded"

# 마우스 모드 토글 (agents view 처럼 마우스를 점유하는 TUI 에서 tmux 드래그-복사 임시 복구)
#  - OFF: 터미널 네이티브 선택 → 드래그하면 자동 복사 (Shift 불필요)
#  - ON : tmux 마우스(스크롤/페인 선택/copy-mode) 복귀
bind a if -F '#{?mouse,1,0}' \
  'set -g mouse off ; display "Mouse: OFF — 드래그-복사 가능"' \
  'set -g mouse on  ; display "Mouse: ON"'

# 분할 (현재 경로 유지)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 새 윈도우 (현재 경로)
bind c new-window -c "#{pane_current_path}"

# yazi 파일 탐색기 (Prefix + Tab: 좌측 60% 분할, 현재 경로 / 종료 시 페인 닫힘)
bind Tab split-window -h -b -l 60% -c "#{pane_current_path}" "yazi"

# ═════════════════════ 카피 모드 ═════════════════════
setw -g mode-keys vi

# ═════════════════════ 상태바 (Catppuccin) ═════════════════════
# 윈도우 활동 표시
setw -g monitor-activity on
set -g visual-activity off

# ── 플러그인 옵션 (반드시 catppuccin.tmux 로드 전에 설정) ──
# 테마 (yazi 와 동일하게 mocha)
set -g @catppuccin_flavor "mocha"

# 창 탭: 둥근 스타일 + 페인 제목(#T) 대신 창 이름(#W)
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# CPU/RAM 라벨 + padding, 날짜 포맷
set -g @catppuccin_cpu_icon "CPU "
set -g @catppuccin_ram_icon "RAM "
set -g @catppuccin_cpu_text " #{l:#{cpu_percentage}}"
set -g @catppuccin_ram_text " #{l:#{ram_percentage}}"
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"

# 과거 글리프-제거 잔재 unset → 둥근 글리프 기본값 재적용 (라이브 리로드 대응)
set -gqu @catppuccin_status_left_separator
set -gqu @catppuccin_status_middle_separator
set -gqu @catppuccin_status_right_separator
set -gqu @catppuccin_date_time_icon
set -gqu @catppuccin_session_icon
set -gqu @catppuccin_window_left_separator
set -gqu @catppuccin_window_right_separator
set -gqu @catppuccin_window_middle_separator
set -gqu @catppuccin_window_current_left_separator
set -gqu @catppuccin_window_current_right_separator
set -gqu @catppuccin_window_current_middle_separator
set -gqu window-status-format
set -gqu window-status-current-format

# ── 플러그인 로드 ──
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ── 상태줄 구성 (catppuccin 로드 후) ──
# 좌: 세션명
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"

# 우: CPU + 메모리 + 시간/날짜 (length 는 색상코드(#[...])까지 포함되므로 넉넉히)
set -g status-right-length 500
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# tmux-cpu: status-right 의 #{cpu_percentage}/#{ram_percentage} 치환 (status-right 설정 뒤에 실행)
run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
